name: Build and Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/gapi
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=stable,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/gapi:${{ github.ref_name }}

            cd ~/gapi
            git pull
            echo "IMAGE=$IMAGE" > .env

            docker compose pull

            if docker ps --format '{{.Names}}' | grep -q gapi_blue; then
              NEW=gapi_green
              OLD=gapi_blue
            else
              NEW=gapi_blue
              OLD=gapi_green
            fi

            echo "Deploying to $NEW"
            docker compose up -d $NEW

            curl --retry 10 --retry-delay 3 --retry-connrefused \
                -f http://localhost:80
            echo "New version healthy"

            docker stop $OLD || true
            docker rm $OLD || true

            docker image prune -a --filter "until=72h" -f
